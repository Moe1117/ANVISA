name: ANVISA Regulatory Monitor

on:
  schedule:
    # Runs every Monday at 6am UTC (weekly)
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no DB writes, no email)'
        required: false
        default: 'false'
        type: boolean
      lookback_days:
        description: 'Days to look back (default: 35 to catch full month)'
        required: false
        default: '35'

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run ANVISA monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '35' }}
        run: python scripts/anvisa_monitor/main.py

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: anvisa-monitor-logs-${{ github.run_id }}
          path: scripts/anvisa_monitor/logs/
          retention-days: 90
